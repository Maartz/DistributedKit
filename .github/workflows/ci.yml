name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [macos-15, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Swift 6.3
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.3"
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  build-samples:
    runs-on: macos-15
    strategy:
      matrix:
        sample: [SampleWorker, SupervisionDemo]
    steps:
      - uses: actions/checkout@v4
      - name: Install Swift 6.3
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.3"
      - name: Build ${{ matrix.sample }}
        run: swift build
        working-directory: Samples/${{ matrix.sample }}
