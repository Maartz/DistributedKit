name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [macos-15, ubuntu-latest]
        include:
          - os: macos-15
            swift-container: ""
          - os: ubuntu-latest
            swift-container: swiftlang/swift:nightly-6.3-jammy
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.swift-container || null }}
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  build-samples:
    runs-on: macos-15
    strategy:
      matrix:
        sample: [SampleWorker, SupervisionDemo]
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.sample }}
        run: swift build
        working-directory: Samples/${{ matrix.sample }}
