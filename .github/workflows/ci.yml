name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [macos-15, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Swift (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"
      - name: Select Xcode toolchain (macOS)
        if: matrix.os == 'macos-15'
        run: sudo xcode-select -s /Applications/Xcode_16.4.app
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build -Xswiftc -Xfrontend -Xswiftc -validate-tbd-against-ir=none -Xswiftc -Xfrontend -Xswiftc -disable-round-trip-debug-types
      - name: Test
        run: swift test -Xswiftc -Xfrontend -Xswiftc -validate-tbd-against-ir=none -Xswiftc -Xfrontend -Xswiftc -disable-round-trip-debug-types

  build-samples:
    runs-on: macos-15
    strategy:
      matrix:
        sample: [SampleWorker, SupervisionDemo]
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode toolchain
        run: sudo xcode-select -s /Applications/Xcode_16.4.app
      - name: Swift version
        run: swift --version
      - name: Build ${{ matrix.sample }}
        run: swift build -Xswiftc -Xfrontend -Xswiftc -validate-tbd-against-ir=none -Xswiftc -Xfrontend -Xswiftc -disable-round-trip-debug-types
        working-directory: Samples/${{ matrix.sample }}
